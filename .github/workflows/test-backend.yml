name: Test Backend

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd apps/backend
          pip install -e ".[test]"

      - name: Run tests
        run: |
          cd apps/backend
          pytest tests/ -v --cov=app --cov-report=term --cov-fail-under=70
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
